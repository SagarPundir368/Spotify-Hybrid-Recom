stages:
  data_cleaning:
    cmd: python src/data_cleaning.py
    deps:
      - src/data_cleaning.py
      - data/raw/Music Info.csv
    outs:
      - data/processed/cleaned_music_info.csv
    
  transform_data:
    cmd: python -m src.content_based_filtering
    deps:
      - src/content_based_filtering.py
      - src/data_cleaning.py
      - data/processed/cleaned_music_info.csv
    outs:
      - data/transformed/transformed_music_info.npz
      - models/cb_transformer.joblib