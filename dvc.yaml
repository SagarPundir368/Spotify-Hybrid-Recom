stages:
  data_cleaning:
    cmd: python src/data_cleaning.py
    deps:
      - src/data_cleaning.py
      - data/raw/Music Info.csv
    outs:
      - data/processed/cleaned_music_info.csv
    
  transform_data:
    cmd: python -m src.content_based_filtering
    deps:
      - src/content_based_filtering.py
      - src/data_cleaning.py
      - data/processed/cleaned_music_info.csv
    outs:
      - data/transformed/transformed_music_info.npz
      - models/cb_transformer.joblib

  interaction_data:
    cmd: python -m src.collaborative_based_filtering
    deps:
      - src/collaborative_based_filtering.py
      - data/processed/cleaned_music_info.csv
      - data/raw/User Listening History.csv
    outs:
      - data/processed/tracks_ids.npy
      - data/processed/collab_filtered_data.csv
      - data/processed/interaction_matrix.npz
    
  transformed_filtered_data:
    cmd: python -m src.transformed_filtered_data
    deps:
      - src/transformed_filtered_data.py
      - data/processed/collab_filtered_data.csv
    outs:
      - data/transformed/transformed_hybrid_data.npz